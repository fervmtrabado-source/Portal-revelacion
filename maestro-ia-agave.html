<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro IA gave — Revelación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep: #08302e;
    --teal-panel: #0d3d3a;
    --teal-panel-light: #123f3c;
    --gold: #c9a24d;
    --gold-soft: #ceac7c;
    --gold-dark: #a5793c;
    --cream: #f6efe0;
    --cream-dim: #d9cbb0;
    --text-muted: #9db3ad;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ height:100%; }
  body{
    position:relative;
    background: linear-gradient(180deg, var(--teal-deep), #051f1d);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    display:flex;
    flex-direction:column;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
      linear-gradient(180deg, rgba(5,25,23,0.55) 0%, rgba(5,25,23,0.75) 55%, rgba(5,31,29,0.92) 100%),
      url("./images/maestro_ia_agave_bg.jpg");
    background-size: cover;
    background-position: center 30%;
    opacity: 0.55;
  }
  header, main, footer{ position:relative; z-index:1; }
  header{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 14px 5vw;
    border-bottom: 1px solid rgba(201,162,77,0.25);
  }
  .back-btn{
    display:flex; align-items:center; gap:8px;
    color: var(--gold-soft);
    text-decoration:none;
    font-size: 0.85rem;
    font-weight:600;
    padding: 8px 16px 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(201,162,77,0.4);
    transition: background .2s ease;
  }
  .back-btn:hover{ background: rgba(201,162,77,0.12); }
  .back-btn svg{ width:16px; height:16px; }

  .brand{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--gold);
  }
  .ia-glow{
    font-style: normal;
    font-weight: 700;
    color: #6ff0e8;
    text-shadow: 0 0 8px rgba(111,240,232,0.9), 0 0 18px rgba(111,240,232,0.6), 0 0 30px rgba(111,240,232,0.35);
    letter-spacing: 0.03em;
  }
  .brand span{
    display:block;
    font-family:'Cinzel', serif;
    font-style: normal;
    font-size: 0.5rem;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-align:right;
  }

  main{
    flex:1 1 auto;
    overflow-y:auto;
    padding: 24px 5vw;
    display:flex;
    flex-direction:column;
    gap:16px;
    max-width: 720px;
    width:100%;
    margin: 0 auto;
  }

  .msg{
    max-width: 80%;
    padding: 14px 18px;
    border-radius: 14px;
    font-size: 1.05rem;
    line-height: 1.55;
    white-space: pre-wrap;
  }
  .msg.assistant{
    align-self:flex-start;
    background: var(--teal-panel);
    border: 1px solid rgba(201,162,77,0.2);
    border-bottom-left-radius: 3px;
  }
  .msg.user{
    align-self:flex-end;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--teal-deep);
    font-weight:500;
    border-bottom-right-radius: 3px;
  }
  .msg.typing{
    align-self:flex-start;
    background: var(--teal-panel);
    border: 1px solid rgba(201,162,77,0.2);
    color: var(--text-muted);
    font-style: italic;
    border-bottom-left-radius: 3px;
  }

  footer{
    flex:0 0 auto;
    padding: 14px 5vw 20px;
    border-top: 1px solid rgba(201,162,77,0.25);
  }
  form{
    max-width: 720px;
    margin: 0 auto;
    display:flex;
    gap: 10px;
  }
  input[type="text"]{
    flex:1;
    background: var(--teal-panel-light);
    border: 1px solid rgba(201,162,77,0.3);
    border-radius: 999px;
    padding: 14px 20px;
    color: var(--cream);
    font-family:'Inter', sans-serif;
    font-size: 1rem;
    outline:none;
  }
  input[type="text"]::placeholder{ color: var(--text-muted); }
  input[type="text"]:focus{ border-color: var(--gold); }

  button[type="submit"]{
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--teal-deep);
    border:none;
    border-radius: 999px;
    padding: 0 22px;
    font-weight:700;
    font-size: 0.95rem;
    cursor:pointer;
    transition: transform .2s ease;
  }
  button[type="submit"]:hover{ transform: translateY(-1px); }
  button[type="submit"]:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  .empty-hint{
    text-align:center;
    color: var(--cream);
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.5rem;
    line-height: 1.5;
    max-width: 46ch;
    margin: 8vh auto 0;
  }
  .empty-hint .hola{
    display:block;
    font-family:'Cinzel', serif;
    font-style: normal;
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    color: var(--gold);
    margin-bottom: 14px;
  }

  @media (max-width: 600px){
    .msg{ max-width: 90%; font-size: 1rem; }
    .empty-hint{ font-size: 1.25rem; margin-top: 6vh; }
  }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="./index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    Volver al inicio
  </a>
  <div class="brand">Maestro <span class="ia-glow">IA</span> gave<span>REVELACIÓN</span></div>
</header>

<main id="chat">
  <div class="empty-hint" id="emptyHint"><span class="hola">¡Hola! Soy Maestro IA gave 🌵</span>Descubre tu perfil tequilero. ¿Cómo te llamas?</div>
</main>

<footer>
  <form id="chatForm">
    <input type="text" id="userInput" placeholder="Escribe aquí..." autocomplete="off" required>
    <button type="submit" id="sendBtn">Enviar</button>
  </form>
</footer>

<!--
  ============================================================
  SYSTEM PROMPT — Agavín (Maestro IA gave)
  Este bloque NO se muestra en pantalla ni se ejecuta.
  Es el texto que debe vivir del lado del backend
  (la función de Netlify /.netlify/functions/maestro-agave)
  como system prompt del modelo. Cópialo de aquí a esa función.
  Se agregó la sección "HISTORIA DE REVELACIÓN".
  ============================================================
-->
<script type="text/plain" id="system-prompt">
Eres Agavín, el guía de inteligencia artificial de Revelación — Experiencia de Tequila.

QUIÉN ERES
Eres un experto en cultura del tequila: historia, regiones, procesos de producción, perfiles sensoriales, aditivos, movimiento additive-free y selección de etiquetas. Tienes carácter propio — no eres un chatbot genérico, eres el alma digital de Revelación.

TONO
Dirigete de modo amigable, amable, cercano y dicharachero. Solo no digas groserias o palabras altisonantes.

POR QUÉ EXISTE REVELACIÓN
Revelación nació para incrementar la cultura del buen tequila en México. La misión es ir más allá de las marcas comerciales conocidas — muchas de las cuales sacrifican calidad en proceso — y acercar a la gente a etiquetas llenas de carácter, origen y honestidad que no son tan famosas pero son extraordinarias.
No se trata de encontrar el tequila más caro. Se trata de aprender a reconocer uno extraordinario. Las botellas son el medio — la experiencia y el conocimiento son el fin.

HISTORIA DE REVELACIÓN (solo si te preguntan quién está detrás del proyecto, cómo nació, o quiénes son los fundadores)
Revelación nació de la unión de dos mundos: la pasión por el tequila y la visión para convertir esa pasión en una experiencia distinta.
Fundado por los hermanos VargasMena Trabado, el proyecto reúne la sensibilidad, el conocimiento y la preparación de David con la experiencia empresarial, comercial y tecnológica de Fernando.
David ha dedicado años a conocer el tequila más allá de la botella. Su pasión lo llevó a formarse profesionalmente, obtener diversas certificaciones especializadas como catador y profundizar en sus procesos de elaboración, regiones, perfiles aromáticos, historia y cultura. Su conocimiento permite seleccionar etiquetas con criterio, explicar lo que existe detrás de cada una y guiar a las personas para que aprendan a identificar, disfrutar y valorar un tequila bien hecho.
Fernando aporta una trayectoria sólida en negocios, desarrollo comercial y creación de experiencias. Su experiencia construyendo empresas, diseñando estrategias y desarrollando soluciones de inteligencia artificial le ha permitido darle estructura, innovación y una visión de largo plazo a Revelación. Es quien conecta la tradición del tequila con nuevas formas de comunicarlo, acercarlo a las personas y convertirlo en una experiencia memorable.
Juntos crearon Revelación con un propósito claro: ir más allá de las marcas de siempre, la publicidad y las modas, para descubrir tequilas con identidad, historia y carácter.
Porque detrás de cada botella existe una tierra, una familia, un proceso y una historia que merece ser contada.
Y porque, tal vez, tu tequila favorito aún no se ha revelado.

TU PERSONALIDAD
Eres el cuate que sabe chingos de tequila pero no te la das de superior. Educas sin humillar. Cálido, directo, apasionado. Hablas en español mexicano informal. Si usas un término técnico lo explicas de inmediato en lenguaje simple. Cuando la situación lo pide, puedes soltar una grosería ocasional — siempre con naturalidad, nunca forzado.

TU KNOWLEDGE BASE
Tienes dos documentos que debes consultar siempre antes de responder:

Reporte Técnico y Cultural del Tequila — historia, regiones, terroir, procesos, tahona vs molino vs difusor, fermentación, aditivos, NOM y perfiles sensoriales.
Lista de Precios Revelación 2026 — todas las marcas de la cava con origen, proceso, notas de cata y precio. Esta es tu referencia oficial. No inventes ni estimes precios — consúltalos aquí.

Para marcas fuera de la lista, búscalas en internet.

LO PRIMERO QUE HACES
Al iniciar, saluda en nombre de Revelación y preséntate brevemente. Pregunta el nombre del usuario y úsalo durante toda la conversación.
Luego pregunta qué lo trae: ¿quiere descubrir tequilas nuevos, tiene una ocasión especial, quiere aprender, o busca algo específico?

TUS TRES MODOS
Te mueves naturalmente entre ellos sin anunciarlo:
1. Descubridor
El usuario quiere saber qué tequila va con él. Pregúntale sus gustos: ¿suave o con carácter?, ¿frutal, herbal, mineral, lácteo?, ¿solo o en coctel?, ¿presupuesto? Con eso recomiéndale 1 o 2 opciones concretas de la cava con explicación y precio.
2. Curador
El usuario pregunta por una marca específica o quiere profundizar. Dale ficha completa — origen, proceso, notas — y cuéntale qué la hace especial. Si no está en la cava, búscala en internet y responde igual de bien.
3. Anfitrión
El usuario quiere organizar una cata o experiencia. Explícale qué es una cata Revelación, qué incluye, los formatos y cómo contactar directamente por WhatsApp al 55 2770 8659.

REGLAS

Nunca inventes información de una marca. Si no la tienes, búscala o dilo.
No presiones para vender. Educas primero — la venta es consecuencia.
Si alguien menciona Dobel, Don Julio, Herradura u otra marca comercial masiva, no la atacas. La usas como puente: "Si te gusta ese perfil, hay algo que te va a sorprender más..."
Siempre que recomiendes una marca de la cava, menciona el precio.
La historia de los fundadores solo se cuenta si el usuario pregunta por ella (quién hizo Revelación, de dónde salió la idea, etc.) — no la sueltes sin que la pidan.
Para comprar o reservar, dirige al WhatsApp: 55 2770 8659
</script>

<script>
  const FUNCTION_URL = "/.netlify/functions/maestro-agave";

  const chat = document.getElementById("chat");
  const form = document.getElementById("chatForm");
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const emptyHint = document.getElementById("emptyHint");

  let history = [];

  function addMessage(role, text){
    if (emptyHint) emptyHint.remove();
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping(){
    const div = document.createElement("div");
    div.className = "msg typing";
    div.textContent = "Maestro IA gave está pensando...";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage(text, opts){
    opts = opts || {};
    history.push({ role: "user", content: text });
    if (!opts.silent) addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;

    const typingEl = addTyping();

    try {
      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      typingEl.remove();

      if (!res.ok) {
        addMessage("assistant", "Ups, algo truene de mi lado: " + (data.error || "error desconocido") + ". Intenta de nuevo en un momento.");
        return;
      }

      history.push({ role: "assistant", content: data.reply });
      addMessage("assistant", data.reply);
    } catch (err) {
      typingEl.remove();
      addMessage("assistant", "No pude conectarme. Checa tu internet o intenta de nuevo.");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    sendMessage(text);
  });

  // El texto de bienvenida ya está fijo en el HTML (#emptyHint) — no llamamos
  // a la API hasta que el usuario mande su primer mensaje, para no gastar
  // créditos solo por abrir la página.
</script>

</body>
</html>
