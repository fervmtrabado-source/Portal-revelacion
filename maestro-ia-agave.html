<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro IA gave — Revelación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal-deep: #08302e;
    --teal-panel: #0d3d3a;
    --teal-panel-light: #123f3c;
    --gold: #c9a24d;
    --gold-soft: #ceac7c;
    --gold-dark: #a5793c;
    --cream: #f6efe0;
    --cream-dim: #d9cbb0;
    --text-muted: #9db3ad;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ height:100%; }
  body{
    position:relative;
    background: linear-gradient(180deg, var(--teal-deep), #051f1d);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    display:flex;
    flex-direction:column;
  }
  body::before{
    content:"";
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    background-image:
      linear-gradient(180deg, rgba(5,25,23,0.55) 0%, rgba(5,25,23,0.75) 55%, rgba(5,31,29,0.92) 100%),
      url("./images/maestro_ia_agave_bg.jpg");
    background-size: cover;
    background-position: center 30%;
    opacity: 0.55;
  }
  header, main, footer{ position:relative; z-index:1; }
  header{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 14px 5vw;
    border-bottom: 1px solid rgba(201,162,77,0.25);
  }
  .back-btn{
    display:flex; align-items:center; gap:8px;
    color: var(--gold-soft);
    text-decoration:none;
    font-size: 0.85rem;
    font-weight:600;
    padding: 8px 16px 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(201,162,77,0.4);
    transition: background .2s ease;
  }
  .back-btn:hover{ background: rgba(201,162,77,0.12); }
  .back-btn svg{ width:16px; height:16px; }

  .brand{
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--gold);
  }
  .ia-glow{
    font-style: normal;
    font-weight: 700;
    color: #6ff0e8;
    text-shadow: 0 0 8px rgba(111,240,232,0.9), 0 0 18px rgba(111,240,232,0.6), 0 0 30px rgba(111,240,232,0.35);
    letter-spacing: 0.03em;
  }
  .brand span{
    display:block;
    font-family:'Cinzel', serif;
    font-style: normal;
    font-size: 0.5rem;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-align:right;
  }

  main{
    flex:1 1 auto;
    overflow-y:auto;
    padding: 24px 5vw;
    display:flex;
    flex-direction:column;
    gap:16px;
    max-width: 720px;
    width:100%;
    margin: 0 auto;
  }

  .msg{
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.92rem;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .msg.assistant{
    align-self:flex-start;
    background: var(--teal-panel);
    border: 1px solid rgba(201,162,77,0.2);
    border-bottom-left-radius: 3px;
  }
  .msg.user{
    align-self:flex-end;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--teal-deep);
    font-weight:500;
    border-bottom-right-radius: 3px;
  }
  .msg.typing{
    align-self:flex-start;
    background: var(--teal-panel);
    border: 1px solid rgba(201,162,77,0.2);
    color: var(--text-muted);
    font-style: italic;
    border-bottom-left-radius: 3px;
  }

  footer{
    flex:0 0 auto;
    padding: 14px 5vw 20px;
    border-top: 1px solid rgba(201,162,77,0.25);
  }
  form{
    max-width: 720px;
    margin: 0 auto;
    display:flex;
    gap: 10px;
  }
  input[type="text"]{
    flex:1;
    background: var(--teal-panel-light);
    border: 1px solid rgba(201,162,77,0.3);
    border-radius: 999px;
    padding: 13px 20px;
    color: var(--cream);
    font-family:'Inter', sans-serif;
    font-size: 0.92rem;
    outline:none;
  }
  input[type="text"]::placeholder{ color: var(--text-muted); }
  input[type="text"]:focus{ border-color: var(--gold); }

  button[type="submit"]{
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    color: var(--teal-deep);
    border:none;
    border-radius: 999px;
    padding: 0 22px;
    font-weight:700;
    font-size: 0.88rem;
    cursor:pointer;
    transition: transform .2s ease;
  }
  button[type="submit"]:hover{ transform: translateY(-1px); }
  button[type="submit"]:disabled{ opacity:0.5; cursor:not-allowed; transform:none; }

  .empty-hint{
    text-align:center;
    color: var(--text-muted);
    font-family:'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    margin-top: 10vh;
  }

  @media (max-width: 600px){
    .msg{ max-width: 90%; }
  }
</style>
</head>
<body>

<header>
  <a class="back-btn" href="./index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
    Volver al inicio
  </a>
  <div class="brand">Maestro <span class="ia-glow">IA</span> gave<span>REVELACIÓN</span></div>
</header>

<main id="chat">
  <div class="empty-hint" id="emptyHint">Pregúntame lo que quieras del mundo del tequila 🌵</div>
</main>

<footer>
  <form id="chatForm">
    <input type="text" id="userInput" placeholder="Escribe aquí..." autocomplete="off" required>
    <button type="submit" id="sendBtn">Enviar</button>
  </form>
</footer>

<script>
  const FUNCTION_URL = "/.netlify/functions/maestro-agave";

  const chat = document.getElementById("chat");
  const form = document.getElementById("chatForm");
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");
  const emptyHint = document.getElementById("emptyHint");

  let history = [];

  function addMessage(role, text){
    if (emptyHint) emptyHint.remove();
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function addTyping(){
    const div = document.createElement("div");
    div.className = "msg typing";
    div.textContent = "Maestro IA gave está pensando...";
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage(text, opts){
    opts = opts || {};
    history.push({ role: "user", content: text });
    if (!opts.silent) addMessage("user", text);
    input.value = "";
    sendBtn.disabled = true;

    const typingEl = addTyping();

    try {
      const res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history }),
      });
      const data = await res.json();
      typingEl.remove();

      if (!res.ok) {
        addMessage("assistant", "Ups, algo truene de mi lado: " + (data.error || "error desconocido") + ". Intenta de nuevo en un momento.");
        return;
      }

      history.push({ role: "assistant", content: data.reply });
      addMessage("assistant", data.reply);
    } catch (err) {
      typingEl.remove();
      addMessage("assistant", "No pude conectarme. Checa tu internet o intenta de nuevo.");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    sendMessage(text);
  });

  // El texto de bienvenida ya está fijo en el HTML (#emptyHint) — no llamamos
  // a la API hasta que el usuario mande su primer mensaje, para no gastar
  // créditos solo por abrir la página.
</script>

</body>
</html>
