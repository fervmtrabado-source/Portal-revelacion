<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revelación — Experiencia de Tequila</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&family=Cinzel:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --cream: #f6efe0;
    --cream-card: #f2e4d2;
    --cream-dim: #d9cbb0;
    --teal-deep: #08302e;
    --teal-btn: #0b4b48;
    --teal-btn-light: #14625e;
    --gold: #c9a24d;
    --gold-soft: #ceac7c;
    --gold-dark: #a5793c;
    --text-dark: #22302c;
    --text-muted: #6b5f4d;
    --line: rgba(165,121,60,0.28);

    /* Ajuste fino: si el centro entre columnas no cae exacto en el moño del logo,
       mueve este valor en px (negativo = izquierda, positivo = derecha) */
    --grid-shift: 20px;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  html, body{ height:100%; }
  html{ scroll-behavior:smooth; }

  body{
    background: var(--cream);
    color: var(--text-dark);
    font-family: 'Inter', sans-serif;
    line-height: 1.4;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  h1,h2,h3, .serif{
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
  }

  .eyebrow, .cinzel{
    font-family: 'Cinzel', serif;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }

  a{ color:inherit; text-decoration:none; }

  /* ---------- ambient background (placeholder for foto real de agaves) ---------- */
  .bg-scene{
    position: fixed;
    inset: 0;
    z-index: -1;
    background-image:
      linear-gradient(180deg, rgba(10,20,25,0.05) 0%, rgba(10,20,25,0.02) 35%, rgba(246,239,224,0.22) 80%, rgba(246,239,224,0.42) 100%),
      url("./images/fondo.jpg");
    background-size: cover;
    background-position: center top;
  }

  .bg-note{
    position:absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    color: rgba(34,48,44,0.35);
    z-index: 5;
    letter-spacing: 0.05em;
  }

  /* ---------- NAV ---------- */
  header{
    flex: 0 0 auto;
    position: relative;
    z-index: 50;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 14px 5vw;
    background: transparent;
  }

  .brandmark{
    display:flex;
    flex-direction:column;
    line-height:1;
    background: rgba(246,239,224,0.68);
    backdrop-filter: blur(6px);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 16px;
    box-shadow: 0 6px 18px rgba(30,25,15,0.1);
  }
  .brandmark .name{
    font-family:'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-style: italic;
    font-weight:600;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .brandmark .sub{
    font-family:'Cinzel', serif;
    font-size: 0.5rem;
    letter-spacing: 0.3em;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .btn-wsp{
    display:flex;
    align-items:center;
    gap:10px;
    padding: 12px 24px 12px 12px;
    border-radius: 999px;
    background: linear-gradient(135deg, #1EBE5D, #128C4A);
    color: #ffffff;
    font-weight:800;
    font-size: 0.76rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space:nowrap;
    transition: transform .25s ease, box-shadow .25s ease;
    box-shadow: 0 6px 18px rgba(18,140,74,0.35);
  }
  .btn-wsp:hover{ transform: translateY(-2px); box-shadow: 0 8px 22px rgba(18,140,74,0.45); }
  .btn-wsp .wsp-icon{
    width:28px; height:28px;
    flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    background: #ffffff;
    border-radius: 50%;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.04);
  }
  .btn-wsp .wsp-icon svg{ width:17px; height:17px; display:block; }


  /* ---------- HERO ---------- */
  .hero{
    flex: 1 1 auto;
    position: relative;
    padding: 0;
    min-height: 0;
  }

  .tagline-wrap{
    position: absolute;
    left: 3vw;
    top: 8%;
    max-width: 300px;
    text-align: left;
    padding: 18px 20px;
  }
  .tagline-wrap::before{
    content:"";
    position:absolute;
    inset: -10px;
    background: radial-gradient(ellipse at center, rgba(246,239,224,0.55) 0%, rgba(246,239,224,0.15) 65%, transparent 85%);
    filter: blur(6px);
    z-index: -1;
    border-radius: 20px;
  }

  .tagline-wrap p.tagline{
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(1.4rem, 2.8vw, 2rem);
    color: var(--teal-deep);
    line-height: 1.25;
    text-shadow: 0 1px 4px rgba(246,239,224,0.95), 0 2px 18px rgba(246,239,224,0.9);
  }
  .tagline-wrap p.tagline em{ color: var(--gold-dark); font-weight:700; font-style: italic; }

  /* ---------- CARD GRID ---------- */
  .grid{
    flex: 0 0 auto;
    position: relative;
    left: calc(50% + var(--grid-shift, 0px));
    transform: translateX(-50%);
    display:grid;
    grid-template-columns: 1fr 1fr;
    row-gap: 14px;
    column-gap: 110px;
    max-width: 700px;
    width: 88vw;
    padding: 0 0 calc(1.4vh + 38px);
  }

  .card{
    position:relative;
    border-radius: 12px;
    border: 1.5px solid rgba(255,224,160,0.75);
    min-height: 130px;
    overflow:hidden;
    background-size: cover;
    background-position: center;
    box-shadow: 0 0 0 2px rgba(255,224,160,0.25), 0 0 45px rgba(255,210,120,0.65), 0 10px 24px rgba(0,0,0,0.3);
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .card:hover{ transform: translateY(-3px); box-shadow: 0 0 0 2px rgba(255,224,160,0.4), 0 0 55px rgba(255,210,120,0.8), 0 16px 32px rgba(0,0,0,0.35); }

  .card-copy{
    position: absolute;
    left: 0; right: 0; bottom: 0;
    z-index: 2;
    padding: 8px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 8px;
  }

  .card.light{ color: var(--text-dark); background-color: var(--cream-card); }
  .card.light .card-copy{
    background: linear-gradient(0deg, rgba(242,228,210,0.92) 0%, rgba(242,228,210,0.75) 60%, transparent 100%);
  }

  .card.dark{ color: var(--cream); background-color: var(--teal-deep); }
  .card.dark .card-copy{
    background: linear-gradient(0deg, rgba(8,48,46,0.92) 0%, rgba(8,48,46,0.75) 60%, transparent 100%);
  }

  .num{ display:none; }

  .card h3{
    font-size: 0.92rem;
    font-style: italic;
    letter-spacing: 0.01em;
    text-transform: uppercase;
    font-weight: 600;
    line-height: 1.15;
  }
  .card h3 .accent{ color: var(--gold-dark); font-style: italic; }
  .card.dark h3 .accent{ color: var(--gold-soft); }

  .arrow{
    width: 22px; height:22px;
    flex-shrink:0;
    border-radius:50%;
    border: 1px solid var(--gold-dark);
    display:flex; align-items:center; justify-content:center;
    transition: background .25s ease, transform .25s ease;
  }
  .card.dark .arrow{ border-color: var(--gold-soft); }
  .card:hover .arrow{ background: var(--gold); transform: rotate(45deg); }
  .arrow svg{ width:10px; height:10px; stroke: var(--gold-dark); transition: stroke .25s ease; }
  .card.dark .arrow svg{ stroke: var(--gold-soft); }
  .card:hover .arrow svg{ stroke: var(--teal-deep); }

  /* footer removido a petición del cliente, para dar más protagonismo al fondo */

  @media (max-width: 760px){
    .tagline-wrap{ left: 5vw; right: 5vw; max-width: none; top: 5%; }
    .card-copy{ padding: 8px 10px; }
    .card{ min-height: 90px; }
    .card h3{ font-size: 0.82rem; }
    .card p{ display:none; }
    .btn-wsp span{ display:none; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; scroll-behavior:auto !important; }
  }
</style>
</head>
<body>

<div class="bg-scene"></div>

<header>
  <div class="brandmark">
    <span class="name">Revelación</span>
    <span class="sub">EXPERIENCIA DE TEQUILA</span>
  </div>
  <a class="btn-wsp" href="https://wa.me/525554346689" target="_blank" rel="noopener">
    <span class="wsp-icon">
      <svg viewBox="0 0 24 24" fill="#128C4A"><path d="M20.5 3.5A11 11 0 003.3 17L2 22l5.2-1.3A11 11 0 1020.5 3.5zM12 20a8 8 0 01-4.1-1.1l-.3-.2-3 .8.8-2.9-.2-.3A8 8 0 1112 20zm4.4-5.8c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1s-.6.8-.7.9-.3.2-.5.1a6.6 6.6 0 01-2-1.2 7.3 7.3 0 01-1.4-1.7c-.1-.2 0-.4.1-.5l.4-.4c.1-.1.2-.3.2-.4a.5.5 0 000-.5c-.1-.1-.5-1.2-.7-1.7s-.4-.4-.5-.4h-.5a.9.9 0 00-.6.3 2.8 2.8 0 00-.9 2 4.9 4.9 0 001 2.6 11.2 11.2 0 004.3 3.8c.6.2 1 .4 1.4.5a3.4 3.4 0 001.5.1 2.5 2.5 0 001.6-1.2 2 2 0 00.1-1.2c0-.1-.2-.2-.4-.3z"/></svg>
    </span>
    <span>WhatsApp / Reservar</span>
  </a>
</header>

<section class="hero">
  <div class="tagline-wrap">
    <p class="tagline">Tu tequila favorito quizá <em>todavía no se ha revelado.</em></p>
  </div>
</section>

<div class="grid">

  <a class="card light" href="https://drive.google.com/file/d/1HuIP86KqG_C3mQuvKcdd-Bdv371agGlA/view?usp=sharing" target="_blank" rel="noopener" style="background-image:url('./images/porque_existimos.jpg'); background-position:center; background-size:contain; background-repeat:no-repeat;">
    <div class="card-copy">
      <h3>Por qué existimos</h3>
      <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </div>
  </a>

  <a class="card dark" href="./maestro-ia-agave.html" style="background-image:url('./images/maestro_ia_agave.jpg'); background-position:center 55%;">
    <div class="card-copy">
      <h3>Maestro <span class="accent">IA</span> gave</h3>
      <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </div>
  </a>

  <a class="card dark" href="https://cavarevelacion.netlify.app/" target="_blank" rel="noopener" style="background-image:url('./images/nuestra_cava.jpg'); background-position:center 35%;">
    <div class="card-copy">
      <h3>La Cava</h3>
      <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </div>
  </a>

  <a class="card light" href="#experiencias" style="background-image:url('./images/experiencia_de_cata.jpg'); background-position:center 40%;">
    <div class="card-copy">
      <h3>Experiencias de cata</h3>
      <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    </div>
  </a>

</div>

</body>
</html>
